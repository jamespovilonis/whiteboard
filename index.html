<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous" defer></script>
    <script src="answerCapture.js" defer></script>
    <script src="characterCapture.js" defer></script>
    <script src="generateRaster.js" defer></script>
    <script src="recognizeQuestion.js" defer></script>
    <script src="whiteboard.js" defer></script>
</head>
<body>
    <div class="canvas-container">
        <canvas id="whiteboard"></canvas>
        <div class="toolbar" role="toolbar" aria-label="Drawing tools">
            <span class="toolbar-toggle" aria-hidden="true"><img src="icons/pencil.png" alt="" class="tool-icon"></span>
            <div class="toolbar-content">
                <button id="mouse" class="tool-btn" title="Mouse (M)" aria-label="Pan tool"><img src="icons/cursor.png" alt="Pan tool" class="tool-icon"></button>
                <button id="pen" class="tool-btn active" title="Pen (P)" aria-label="Pen tool"><img src="icons/pencil.png" alt="Pen tool" class="tool-icon"></button>
                <button id="eraser" class="tool-btn" title="Eraser (E)" aria-label="Eraser tool"><img src="icons/eraser.png" alt="Eraser tool" class="tool-icon"></button>
                <button id="recognize" class="tool-btn recognize-btn" title="Recognize (T)" aria-label="Recognize handwriting">
                    <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M9 11l3 3L22 4"></path>
                        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
                    </svg>
                </button>
                <div class="toolbar-divider" role="separator"></div>
                <div class="color-picker-wrap" title="Color" aria-label="Stroke color">
                    <button class="color-btn" style="background:#000000" aria-label="Change color"></button>
                    <div class="color-picker-dropdown">
                        <div class="color-swatch swatch-black active" data-color="#000000" style="background:#000000"></div>
                        <div class="color-swatch swatch-dark" data-color="#333333" style="background:#333333"></div>
                        <div class="color-swatch swatch-gray" data-color="#888888" style="background:#888888"></div>
                        <div class="color-swatch swatch-white" data-color="#ffffff" style="background:#ffffff"></div>
                        <div class="color-swatch swatch-red" data-color="#e53935" style="background:#e53935"></div>
                        <div class="color-swatch swatch-orange" data-color="#fb8c00" style="background:#fb8c00"></div>
                        <div class="color-swatch swatch-yellow" data-color="#fdd835" style="background:#fdd835"></div>
                        <div class="color-swatch swatch-green" data-color="#43a047" style="background:#43a047"></div>
                        <div class="color-swatch swatch-cyan" data-color="#00acc1" style="background:#00acc1"></div>
                        <div class="color-swatch swatch-blue" data-color="#1e88e5" style="background:#1e88e5"></div>
                        <div class="color-swatch swatch-purple" data-color="#8e24aa" style="background:#8e24aa"></div>
                        <div class="color-swatch swatch-pink" data-color="#d81b60" style="background:#d81b60"></div>
                    </div>
                </div>
                <input type="range" id="sizePicker" min="1" max="10" value="4" title="Brush size" aria-label="Brush size">
                <span id="sizeValue" aria-live="polite">5</span>
                <div id="serverStatus" class="server-status" title="CoMER server status"></div>
            </div>
        </div>
    </div>
    <div id="toast" class="toast"></div>
</body>
</html>
